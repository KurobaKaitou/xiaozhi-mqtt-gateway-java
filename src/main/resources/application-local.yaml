gateway:
  mqtt:
    enabled: ${GATEWAY_MQTT_ENABLED:true}
    # 本地联调默认指向你的测试 EMQX
    server-uri: ${GATEWAY_MQTT_SERVER_URI:tcp://114.132.160.185:1883}
    username: ${GATEWAY_MQTT_USERNAME:}
    password: ${GATEWAY_MQTT_PASSWORD:}

  runtime:
    # 本地联调：设备必须能访问到这个地址
    udp-public-host: ${PUBLIC_IP:192.168.10.147}
    udp-port: ${UDP_PORT:8884}

  udp:
    enabled: ${GATEWAY_UDP_ENABLED:true}
    bind-host: ${GATEWAY_UDP_BIND_HOST:0.0.0.0}
    bind-port: ${UDP_PORT:8884}

  bridge:
    enabled: ${GATEWAY_BRIDGE_ENABLED:true}
    chat-servers:
      - ${GATEWAY_BRIDGE_CHAT_SERVER:ws://192.168.10.147:8000/xiaozhi/v1/?from=mqtt_gateway}

logging:
  level:
    site.dimensions0718.ai.xiaozhi.mqtt.gateway: INFO
